name: Sync Canton validators to Attio

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  # Allow manual runs from the GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log active/stale counts without writing to Attio"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run sync script
        env:
          ATTIO_API_TOKEN: ${{ secrets.ATTIO_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: |
          python sync_canton_validators_to_attio.py
